name: Swift

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Select latest stable Swift
        run: swift --version

      - name: Build
        run: swift build --verbose

      - name: Run tests
        run: swift test --verbose
